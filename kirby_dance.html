<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Kirbs | Dashboard</title>
    <style>
        :root { 
            --kirby-pink: #ffafcc; 
            --cosmic-glow: #ff00ff; 
            --bg-dark: #050505;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            margin: 0;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            /* Starfield effect */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
        }

        .container {
            padding: 40px;
            border: 1px solid rgba(255, 175, 204, 0.2);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);
        }

        .glitch { 
            font-size: 1.2rem; 
            letter-spacing: 5px;
            color: var(--kirby-pink); 
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.8;
            animation: pulse 2s infinite ease-in-out;
        }

        /* Kirby Dance Logic */
        .kirby-dance { 
            font-size: 4rem; 
            display: inline-block;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .step { 
            display: inline-block;
            animation: victory-dance 1.8s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--kirby-pink));
        }

        @keyframes victory-dance {
            0%, 100% { transform: translateY(0) rotate(0deg) scaleX(1); }
            20%      { transform: translateY(-20px) rotate(15deg) scaleX(1); }
            40%      { transform: translateY(0) rotate(0deg) scaleX(1); }
            50%      { transform: scaleX(-1); } /* Seamless flip */
            70%      { transform: translateY(-20px) rotate(-15deg) scaleX(-1); }
            90%      { transform: translateY(0) rotate(0deg) scaleX(-1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; text-shadow: 0 0 0px var(--cosmic-glow); }
            50%      { opacity: 1; text-shadow: 0 0 15px var(--cosmic-glow); }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch">Poyo Mission Active</div>
        <div class="kirby-dance">
            <span class="step">&lt;( " )&gt;</span>
        </div>
    </div>
    <div class="footer">SESSION LOGGED FOR: avsn17</div>
</body>
</html>
